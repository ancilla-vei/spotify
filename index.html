<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i> Spotify Clone
            </div>
            <ul class="nav-links">
                <li id="navHome" class="active"><i class="fas fa-home"></i> Home</li>
                <li id="navSearch"><i class="fas fa-search"></i> Search</li>
                <li id="navLibrary"><i class="fas fa-book"></i> Your Library</li>
            </ul>
            
            <div class="playlists">
                <div class="playlist-header">
                    <p>PLAYLISTS</p>
                    <i class="fas fa-plus"></i>
                </div>
                <ul class="playlist-list" id="playlistList">
                    <li>Chill Vibes</li>
                    <li>Workout Mix</li>
                    <li>Focus Flow</li>
                    <li>Top Hits 2026</li>
                    <li>Discover Weekly</li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="nav-arrows">
                    <button class="arrow-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="arrow-btn"><i class="fas fa-chevron-right"></i></button>
                    <div class="search-box" id="searchBox" style="display: none;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="What do you want to listen to?">
                    </div>
                </div>
                <div class="user-profile">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <span>Ancilla</span>
                    <i class="fas fa-caret-down"></i>
                </div>
            </header>
            
            <div class="content-padding">
                <h2 class="greeting" id="greeting">Good afternoon</h2>
                
                <h3 class="section-title" id="sectionTitle">Jump back in</h3>
                <div class="song-grid" id="songGrid">
                    <!-- Song cards will be generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Player Bar -->
    <div class="player-bar">
        <div class="now-playing">
            <img src="cover.png" alt="Album Cover" class="np-cover" id="npCover">
            <div class="np-info">
                <div class="np-title" id="npTitle">Select a track</div>
                <div class="np-artist" id="npArtist">-</div>
            </div>
            <i class="far fa-heart np-heart"></i>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <button class="ctrl-btn"><i class="fas fa-random"></i></button>
                <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-pause-btn" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl-btn"><i class="fas fa-redo-alt"></i></button>
            </div>
            
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <input type="range" class="progress-slider" id="progressSlider" value="0" min="0" max="100" step="0.1">
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        
        <div class="volume-controls">
            <i class="fas fa-volume-up" id="volumeIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" value="100" min="0" max="100">
        </div>
    </div>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">
        <div class="mobile-nav-item active" id="mobileNavHome"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="mobile-nav-item" id="mobileNavSearch"><i class="fas fa-search"></i><span>Search</span></div>
        <div class="mobile-nav-item" id="mobileNavLibrary"><i class="fas fa-book"></i><span>Library</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
